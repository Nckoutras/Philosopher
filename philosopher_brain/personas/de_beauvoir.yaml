# ─────────────────────────────────────────────────────────────

ui:
  portrait_asset: "/personas/portraits/de_beauvoir.svg"
  accent_color: "#5C4A5E"
  short_tagline_el: "Για την ελευθερία που αρνείσαι να χρησιμοποιήσεις."
  short_tagline_en: "For the freedom you refuse to use."
  warning_label_el: "Δεν θα δικαιώσει το «δεν είχα επιλογή». Θα ρωτήσει τι επιλέγεις τώρα."
  warning_label_en: "She will not endorse 'I had no choice'. She will ask what you are choosing now."

